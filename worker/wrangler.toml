name = "daily-news-line-bot"
main = "src/index.js"
compatibility_date = "2026-04-01"

# Public config — non-secret. Secrets are set via `wrangler secret put`:
#   LINE_CHANNEL_ACCESS_TOKEN
#   LINE_CHANNEL_SECRET
#   GITHUB_TOKEN                  (fine-grained PAT, actions:write on this repo)
[vars]
PAGES_URL = "https://jason852145.github.io/daily-news-comics"
GITHUB_REPO = "Jason852145/daily-news-comics"
JASON_USER_ID = "U542b91dfa5acecdae9b156cc422fbb65"

# Cloudflare cron — fallback trigger (primary is cron-job.org at 08:00 TW).
# 00:30 UTC = 08:30 TW: 30 min after primary so generate.py's dedup guard
# can skip cleanly if the primary already produced today's JSON.
[triggers]
crons = ["30 0 * * *"]

# Persist Worker logs so cron failures are diagnosable next time.
[observability]
enabled = true

name: Daily News Comics

on:
  schedule:
    # 每天 00:30 UTC = 台灣時間 08:30
    # GitHub Actions cron 可能延遲 0-15 分鐘，實際執行約 8:30-8:45
    - cron: '30 0 * * *'
  workflow_dispatch:   # 允許在 Actions 頁面手動觸發測試

permissions:
  contents: write   # 需要能 push 產出的 HTML/PNG

jobs:
  generate-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate news comics + send to LINE
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        run: python generate.py

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "daily: $(date -u +'%Y-%m-%d')"
            git push
          fi

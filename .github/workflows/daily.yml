name: Daily News Comics

on:
  schedule:
    # 每天 22:12 UTC = 台灣時間 06:12（隔天早上）
    # 提早排程留大 buffer — GitHub Actions cron 有時會延遲數小時，
    # 這樣就算延遲 2-6 小時，訊息仍能在上午內送達
    - cron: '12 22 * * *'
  workflow_dispatch:   # 允許在 Actions 頁面手動觸發測試

permissions:
  contents: write   # 需要能 push 產出的 HTML/PNG

jobs:
  generate-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate news comics + send to LINE
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          # 手動觸發 = 測試模式 → push 只發給 Jason
          # 排程 cron = 正式 → broadcast 發給所有好友
          LINE_TEST_USER_ID: ${{ github.event_name == 'workflow_dispatch' && secrets.LINE_TEST_USER_ID || '' }}
        run: python generate.py

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "daily: $(date -u +'%Y-%m-%d')"
            git push
          fi
